excluded:
  - Package.swift
  - "**/*.generated.swift"
  - polkadot-appTests
  - polkadot-appIntegrationTests
  - vendor/bundle
  - ".git/"
  - ".gitignore"
  - ".gitmodules"
  - ".build/"
  - ".swiftpm/"
  - "source_packages/"
  - "**/Packages/"
  - "**/.swiftpm/"
  - "*.xcodeproj"
identifier_name:
  excluded:
    - id
nesting:
  type_level: 3
opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - convenience_type
  - empty_count
  - empty_string
  - first_where
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
