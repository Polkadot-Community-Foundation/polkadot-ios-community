name: Build (Dev, unsigned)

# Compile-only lane for the Dev configuration: builds the app (and its embedded
# NotificationServiceExtension) for a generic iOS device WITHOUT code signing, so it
# needs no Apple Developer portal registration, no provisioning profile and no App
# Store Connect API key. Its job is to catch build-process issues early — Swift
# compile errors behind the -DDEV flag (`#elseif NIGHTLY || DEV` gates), pbxproj
# configuration mistakes in the Dev build configuration, SwiftPM resolution — before
# the signed TestFlight lane (release-dev.yml) is exercised.
#
# Required repository secrets (already used by release-dev.yml):
#   GOOGLESERVICE_INFO_PLIST_DEV_BASE64  base64 of the .dev Firebase app's GoogleService-Info.plist
#   W3S_AUTH_KEY                         auth keypair seed (hex); optional for compiling —
#                                        inject-keys.sh falls back to an empty value.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: build-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      RUN_IN_CI: 'true'   # the project's "Copy GoogleService-Info" build phase skips when set
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Provide GoogleService-Info.plist (.dev Firebase app)
        env:
          GS_B64: ${{ secrets.GOOGLESERVICE_INFO_PLIST_DEV_BASE64 }}
        run: echo "$GS_B64" | base64 --decode > polkadot-app/GoogleService-Info.plist

      - name: Generate build-time config (CIKeys)
        env:
          W3S_AUTH_KEY: ${{ secrets.W3S_AUTH_KEY }}
        run: ./Scripts/inject-keys.sh

      - name: Resolve SwiftPM dependencies
        run: xcodebuild -resolvePackageDependencies -project polkadot-app.xcodeproj -scheme polkadot-app

      - name: Build (Dev, no code signing)
        env:
          # The scheme pre-action re-runs Scripts/inject-keys.sh on every build, so
          # W3S_AUTH_KEY must be in scope here too or CIKeys.generated.swift is rewritten
          # with an empty seed (keeps this lane consistent with release-dev.yml).
          W3S_AUTH_KEY: ${{ secrets.W3S_AUTH_KEY }}
        run: |
          set -o pipefail
          xcodebuild \
            -project polkadot-app.xcodeproj \
            -scheme polkadot-app \
            -configuration Dev \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
