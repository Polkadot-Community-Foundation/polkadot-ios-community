name: Release (Paseo)

# Archives the polkadot-app iOS client in the NIGHTLY configuration (the testnet
# contour the README exercises against Paseo) and uploads it to TestFlight. The Paseo
# network wiring is delivered at runtime from Firebase Remote Config (chains_v2 /
# dot_ns_config / ipfs_gateway_url / identity_backend_url) — the Nightly build reads
# `chains_v2` and resolves chains by the fixed ids nightly-relay / nightly-ah /
# nightly-people / nightly-bulletin (KnownChains.swift). Populate those in the Firebase
# project whose GoogleService-Info plist you supply below
# (summit-deployer-skills guides/_tools/paseo-remote-config.json).
#
# Required repository secrets:
#   APP_STORE_CONNECT_KEY_ID         App Store Connect API key id (.p8 key)
#   APP_STORE_CONNECT_ISSUER_ID      API issuer id
#   APP_STORE_CONNECT_KEY_CONTENT    base64 of the .p8 private key
#   APPLE_TEAM_ID                    Developer team id (for signing + ExportOptions)
#   GOOGLE_SERVICE_INFO_PLIST_BASE64 base64 of the Paseo project's GoogleService-Info.plist
#   W3S_AUTH_KEY                     auth keypair seed (hex; required for W3S flows)
# Optional: POSTHOG_API_KEY, SENTRY_DSN/SENTRY_ORG/SENTRY_PROJECT/SENTRY_AUTH_TOKEN,
#   MELD_BASIC_AUTH_TOKEN.
#
# ⚠️ The Nightly xcconfig sets BUNDLE = io.paritytech.polkadotapp (SAME as Release —
#    no .nightly suffix). Confirm the App ID / TestFlight slot before a parallel mainnet
#    build exists, and that App IDs for the app AND its NotificationServiceExtension are
#    registered. Automatic signing (-allowProvisioningUpdates) provisions both.

on:
  workflow_dispatch:
  push:
    tags: ['paseo-v*']

jobs:
  testflight:
    runs-on: macos-15
    env:
      RUN_IN_CI: 'true'   # the project's "Copy GoogleService-Info" build phase skips when set
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Provide GoogleService-Info.plist (Paseo project)
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: echo "$GS_B64" | base64 --decode > polkadot-app/GoogleService-Info.plist

      - name: Generate build-time config (CIKeys)
        env:
          W3S_AUTH_KEY: ${{ secrets.W3S_AUTH_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          MELD_BASIC_AUTH_TOKEN: ${{ secrets.MELD_BASIC_AUTH_TOKEN }}
        run: ./Scripts/inject-keys.sh

      - name: Install App Store Connect API key
        id: asc
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          mkdir -p ./private_keys ~/.appstoreconnect/private_keys
          echo "$KEY_B64" | base64 --decode > "./private_keys/AuthKey_${KEY_ID}.p8"
          cp "./private_keys/AuthKey_${KEY_ID}.p8" ~/.appstoreconnect/private_keys/
          echo "key_path=$PWD/private_keys/AuthKey_${KEY_ID}.p8" >> "$GITHUB_OUTPUT"

      - name: Resolve SwiftPM dependencies
        run: xcodebuild -resolvePackageDependencies -project polkadot-app.xcodeproj -scheme polkadot-app

      - name: Write ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF

      - name: Archive (Nightly = Paseo)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild \
            -project polkadot-app.xcodeproj \
            -scheme polkadot-app \
            -configuration Nightly \
            -archivePath build/polkadot-app.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc.outputs.key_path }}" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

      - name: Export signed .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/polkadot-app.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc.outputs.key_path }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find build -maxdepth 1 -name '*.ipa' | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: polkadot-ios-paseo-nightly
          path: build/*.ipa
          if-no-files-found: warn

      # Alternative distribution (instead of TestFlight): build an `ad-hoc` ipa
      # (ExportOptions method=ad-hoc) and run
      #   firebase appdistribution:distribute build/polkadot-app.ipa \
      #     --app "$FIREBASE_APP_ID" --groups "$FIREBASE_GROUPS"
      # authenticated via a service account with Firebase App Distribution Admin.
